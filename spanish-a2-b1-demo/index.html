<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Español A2-B1 Feria Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Nunito:wght@600;700;800&display=swap" rel="stylesheet">
<style>

/* ==============================
   RESET & ROOT
   ============================== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-page: #F0F3F8;
  --bg-surface: #FFFFFF;
  --bg-sidebar: #FFFFFF;
  --bg-overlay: rgba(0,0,0,0.45);

  --color-exposure: #4F8CF7;
  --color-practice: #4CAF50;
  --color-application: #7C4DFF;
  --color-quiz: #FF9800;

  --color-correct: #4CAF50;
  --color-wrong: #FF5252;

  --text-primary: #1A1D26;
  --text-secondary: #5F6368;
  --text-tertiary: #9AA0A6;

  --radius-card: 16px;
  --radius-button: 12px;
  --radius-pill: 24px;
  --radius-modal: 20px;

  --shadow-card: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-elevated: 0 8px 32px rgba(0,0,0,0.12);
  --shadow-sidebar: 4px 0 24px rgba(0,0,0,0.06);

  --sidebar-width: 280px;
  --header-height: 60px;

  --font-heading: 'Nunito', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --font-body: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
}

html { font-size: 16px; -webkit-font-smoothing: antialiased; }
body {
  font-family: var(--font-body);
  background: var(--bg-page);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ==============================
   HEADER
   ============================== */
.app-header {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--header-height);
  background: var(--bg-surface);
  border-bottom: 1px solid #E8ECF0;
  display: flex; align-items: center;
  padding: 0 20px;
  z-index: 100;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}

.header-logo {
  font-family: var(--font-heading);
  font-weight: 800;
  font-size: 20px;
  color: var(--text-primary);
  display: flex; align-items: center; gap: 8px;
}

.header-logo .logo-icon {
  width: 32px; height: 32px;
  background: linear-gradient(135deg, var(--color-exposure), var(--color-application));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: white; font-size: 16px;
}

.header-right {
  margin-left: auto;
  display: flex; align-items: center; gap: 12px;
}

.result-count {
  font-size: 13px;
  color: var(--text-tertiary);
  font-weight: 500;
  background: var(--bg-page);
  padding: 4px 12px;
  border-radius: var(--radius-pill);
}

.menu-btn {
  display: none;
  width: 40px; height: 40px;
  border: none; background: var(--bg-page);
  border-radius: var(--radius-button);
  cursor: pointer;
  font-size: 18px;
  color: var(--text-secondary);
  transition: background 0.2s;
}
.menu-btn:hover { background: #E4E8EE; }

/* ==============================
   LAYOUT
   ============================== */
.app-body {
  display: flex;
  margin-top: var(--header-height);
  min-height: calc(100vh - var(--header-height));
}

/* ==============================
   SIDEBAR
   ============================== */
.sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--bg-sidebar);
  border-right: 1px solid #E8ECF0;
  padding: 20px 16px;
  position: fixed;
  top: var(--header-height);
  left: 0;
  bottom: 0;
  overflow-y: auto;
  z-index: 50;
  box-shadow: var(--shadow-sidebar);
  transition: transform 0.3s cubic-bezier(0.4,0,0.2,1);
}

.sidebar-section {
  margin-bottom: 24px;
}

.sidebar-section:last-child { margin-bottom: 0; }

.section-title {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 13px;
  color: var(--text-tertiary);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  padding-left: 4px;
}

.filter-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

.filter-chip {
  padding: 7px 16px;
  border-radius: var(--radius-pill);
  border: 1.5px solid #E0E4EA;
  background: var(--bg-surface);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  cursor: pointer;
  transition: all 0.2s ease;
  user-select: none;
  white-space: nowrap;
}
.filter-chip:hover {
  border-color: #C8CDD4;
  background: #F8F9FB;
}
.filter-chip.active {
  background: var(--text-primary);
  color: white;
  border-color: var(--text-primary);
}

.filter-chip[data-filter="course-exposure"].active { background: var(--color-exposure); border-color: var(--color-exposure); }
.filter-chip[data-filter="course-practice"].active { background: var(--color-practice); border-color: var(--color-practice); }
.filter-chip[data-filter="course-application"].active { background: var(--color-application); border-color: var(--color-application); }
.filter-chip[data-filter="course-quiz"].active { background: var(--color-quiz); border-color: var(--color-quiz); }

.filter-chip[data-filter="skill-listen"].active { background: #E91E63; border-color: #E91E63; }
.filter-chip[data-filter="skill-speak"].active { background: #00BCD4; border-color: #00BCD4; }
.filter-chip[data-filter="skill-read"].active { background: #3F51B5; border-color: #3F51B5; }
.filter-chip[data-filter="skill-write"].active { background: #FF5722; border-color: #FF5722; }

.clear-filters {
  display: block;
  text-align: center;
  padding: 10px;
  font-size: 13px;
  color: var(--text-tertiary);
  cursor: pointer;
  border: none;
  background: none;
  font-family: var(--font-body);
  transition: color 0.2s;
}
.clear-filters:hover { color: var(--text-primary); }

/* ==============================
   MAIN CONTENT
   ============================== */
.main-content {
  flex: 1;
  margin-left: var(--sidebar-width);
  padding: 24px;
}

.grid-empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-tertiary);
}
.grid-empty .empty-icon { font-size: 48px; margin-bottom: 16px; }
.grid-empty p { font-size: 15px; }

.exercise-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 16px;
}

/* ==============================
   EXERCISE CARD
   ============================== */
.exercise-card {
  background: var(--bg-surface);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-card);
  overflow: hidden;
  cursor: pointer;
  transition: transform 0.25s ease, box-shadow 0.25s ease;
  animation: fadeInUp 0.4s ease both;
}
.exercise-card:hover {
  transform: translateY(-4px);
  box-shadow: var(--shadow-elevated);
}

.card-accent {
  height: 5px;
  width: 100%;
}
.card-accent[data-course="新授"] { background: var(--color-exposure); }
.card-accent[data-course="练习"] { background: var(--color-practice); }
.card-accent[data-course="应用"] { background: var(--color-application); }
.card-accent[data-course="测验"] { background: var(--color-quiz); }

.card-body {
  padding: 20px;
}

.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.card-icon {
  width: 44px; height: 44px;
  border-radius: 12px;
  background: var(--bg-page);
  display: flex; align-items: center; justify-content: center;
  font-size: 22px;
  flex-shrink: 0;
}

.card-titles {
  flex: 1; min-width: 0;
}

.card-name {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 15px;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.card-name-en {
  font-size: 12px;
  color: var(--text-tertiary);
  margin-top: 2px;
}

.card-desc {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
  margin-bottom: 14px;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}

.tag {
  font-size: 11px;
  font-weight: 600;
  padding: 3px 10px;
  border-radius: var(--radius-pill);
  background: var(--bg-page);
  color: var(--text-tertiary);
}
.tag.course { background: #EEF2FF; color: #5B6ABF; }
.tag.skill { background: #FFF3E0; color: #D84315; }
.tag.knowledge { background: #E8F5E9; color: #2E7D32; }

/* ==============================
   EXERCISE MODAL
   ============================== */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: var(--bg-overlay);
  z-index: 200;
  display: none;
  align-items: center;
  justify-content: center;
  animation: fadeIn 0.2s ease;
}
.modal-overlay.active { display: flex; }

.modal-container {
  width: 393px;
  max-width: 100vw;
  height: 852px;
  max-height: 100vh;
  background: var(--bg-surface);
  border-radius: var(--radius-modal);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: var(--shadow-elevated);
  animation: scaleIn 0.3s cubic-bezier(0.4,0,0.2,1);
  position: relative;
}

.modal-header {
  display: flex;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #E8ECF0;
  flex-shrink: 0;
}

.modal-back {
  width: 36px; height: 36px;
  border: none;
  background: var(--bg-page);
  border-radius: 50%;
  cursor: pointer;
  font-size: 16px;
  color: var(--text-secondary);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.modal-back:hover { background: #E4E8EE; }

.modal-title {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 16px;
  margin-left: 12px;
  flex: 1;
}

.modal-content {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
  position: relative;
}

/* ==============================
   EXERCISE INTERNAL STYLES
   ============================== */
.exercise-container {
  display: flex;
  flex-direction: column;
  min-height: 100%;
  font-family: var(--font-body);
}

.ex-title {
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 18px;
  color: var(--text-primary);
  margin-bottom: 6px;
}

.ex-instruction {
  font-size: 14px;
  color: var(--text-secondary);
  margin-bottom: 20px;
  line-height: 1.5;
}

.ex-content {
  flex: 1;
}

.ex-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-bottom: 20px;
}

.ex-option {
  padding: 14px 18px;
  border: 2px solid #E8ECF0;
  border-radius: var(--radius-button);
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-surface);
  display: flex;
  align-items: center;
  gap: 12px;
  user-select: none;
}

.ex-option:hover { border-color: #C8CDD4; background: #F8F9FB; }

.ex-option .option-letter {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: var(--bg-page);
  display: flex; align-items: center; justify-content: center;
  font-weight: 600;
  font-size: 13px;
  color: var(--text-secondary);
  flex-shrink: 0;
}

.ex-option.selected {
  border-color: var(--color-exposure);
  background: #EEF2FF;
}
.ex-option.selected .option-letter {
  background: var(--color-exposure);
  color: white;
}

.ex-option.correct {
  border-color: var(--color-correct);
  background: #E8F5E9;
}
.ex-option.correct .option-letter {
  background: var(--color-correct);
  color: white;
}

.ex-option.wrong {
  border-color: var(--color-wrong);
  background: #FFEBEE;
}
.ex-option.wrong .option-letter {
  background: var(--color-wrong);
  color: white;
}

.ex-feedback {
  padding: 14px 18px;
  border-radius: var(--radius-button);
  margin-bottom: 16px;
  font-size: 14px;
  font-weight: 500;
  display: none;
  animation: fadeInUp 0.3s ease;
}
.ex-feedback.show { display: block; }
.ex-feedback.correct {
  background: #E8F5E9;
  color: #2E7D32;
  border: 1px solid #A5D6A7;
}
.ex-feedback.wrong {
  background: #FFEBEE;
  color: #C62828;
  border: 1px solid #EF9A9A;
}

.ex-actions {
  display: flex;
  gap: 10px;
  padding-top: 16px;
}

.ex-btn {
  flex: 1;
  padding: 14px;
  border: none;
  border-radius: var(--radius-button);
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.ex-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}
.ex-btn-primary {
  background: var(--color-exposure);
  color: white;
}
.ex-btn-primary:hover:not(:disabled) { background: #3D7AE6; }
.ex-btn-secondary {
  background: var(--bg-page);
  color: var(--text-secondary);
}
.ex-btn-secondary:hover:not(:disabled) { background: #E4E8EE; }

/* Matching exercise specific */
.ex-match-pairs {
  display: flex;
  gap: 12px;
  margin-bottom: 20px;
}
.ex-match-column {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.ex-match-item {
  padding: 12px 16px;
  border: 2px solid #E8ECF0;
  border-radius: var(--radius-button);
  font-size: 14px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-surface);
  user-select: none;
}
.ex-match-item:hover { border-color: #C8CDD4; }
.ex-match-item.selected { border-color: var(--color-exposure); background: #EEF2FF; }
.ex-match-item.matched { border-color: var(--color-correct); background: #E8F5E9; opacity: 0.7; pointer-events: none; }
.ex-match-item.wrong-flash { animation: shake 0.4s ease; border-color: var(--color-wrong); }

/* Fill-in-the-blank */
.ex-sentence {
  font-size: 17px;
  line-height: 2;
  color: var(--text-primary);
  margin-bottom: 20px;
  font-family: var(--font-body);
}
.ex-blank {
  display: inline-block;
  min-width: 80px;
  border-bottom: 2px dashed var(--color-exposure);
  text-align: center;
  color: var(--color-exposure);
  font-weight: 600;
  margin: 0 4px;
  padding: 2px 8px;
  transition: all 0.2s;
}
.ex-blank.filled { border-bottom-style: solid; }
.ex-blank.correct { border-color: var(--color-correct); color: var(--color-correct); }
.ex-blank.wrong { border-color: var(--color-wrong); color: var(--color-wrong); }

.ex-word-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-bottom: 20px;
}
.ex-word {
  padding: 8px 16px;
  border: 1.5px solid #E0E4EA;
  border-radius: var(--radius-pill);
  font-size: 14px;
  cursor: pointer;
  transition: all 0.2s ease;
  background: var(--bg-surface);
  user-select: none;
}
.ex-word:hover { border-color: var(--color-exposure); background: #F5F8FF; }
.ex-word.selected { background: var(--color-exposure); color: white; border-color: var(--color-exposure); }
.ex-word.correct { background: var(--color-correct); color: white; border-color: var(--color-correct); }
.ex-word.wrong { background: var(--color-wrong); color: white; border-color: var(--color-wrong); }

/* Progress bar */
.ex-progress {
  display: flex;
  gap: 4px;
  margin-bottom: 16px;
}
.ex-progress-dot {
  width: 100%;
  height: 4px;
  border-radius: 2px;
  background: #E8ECF0;
  transition: background 0.3s;
}
.ex-progress-dot.done { background: var(--color-correct); }
.ex-progress-dot.current { background: var(--color-exposure); }

/* ==============================
   ANIMATIONS
   ============================== */
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes scaleIn {
  from { opacity: 0; transform: scale(0.95); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes bounceIn {
  0% { transform: scale(1); }
  30% { transform: scale(1.15); }
  60% { transform: scale(0.95); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-8px); }
  40% { transform: translateX(8px); }
  60% { transform: translateX(-6px); }
  80% { transform: translateX(6px); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.08); opacity: 0.85; }
}

/* ==============================
   TOAST
   ============================== */
.toast {
  position: fixed;
  top: 80px;
  left: 50%;
  transform: translateX(-50%);
  padding: 12px 24px;
  border-radius: var(--radius-pill);
  font-family: var(--font-heading);
  font-weight: 700;
  font-size: 14px;
  color: white;
  z-index: 999;
  animation: fadeInUp 0.3s ease;
  pointer-events: none;
}
.toast.correct { background: var(--color-correct); }
.toast.wrong { background: var(--color-wrong); }
.toast.info { background: var(--color-exposure); }

/* ==============================
   RESPONSIVE
   ============================== */
@media (max-width: 1024px) {
  .exercise-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
}

@media (max-width: 768px) {
  .menu-btn { display: flex; align-items: center; justify-content: center; }
  .sidebar {
    transform: translateX(-100%);
    box-shadow: none;
  }
  .sidebar.open {
    transform: translateX(0);
    box-shadow: var(--shadow-elevated);
  }
  .sidebar-backdrop {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--bg-overlay);
    z-index: 40;
  }
  .sidebar-backdrop.active { display: block; }
  .main-content { margin-left: 0; padding: 16px; }
  .exercise-grid { grid-template-columns: 1fr; }
  .modal-container {
    width: 100vw;
    height: 100vh;
    max-height: 100vh;
    border-radius: 0;
  }
}

/* ==============================
   EXERCISE INTERNAL: NEW STYLES
   ============================== */

/* --- NPC Label --- */
.npc-label {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  border-radius: 24px;
  padding: 4px 16px;
  font-weight: 700;
  font-size: 14px;
  margin-bottom: 12px;
  font-family: var(--font-heading);
}
.npc-label.blue { background: #E6F0FF; color: #4F8CF7; }
.npc-label.yellow { background: #FFF9C4; color: #F9A825; }
.npc-label .npc-avatar {
  width: 28px; height: 28px;
  border-radius: 50%;
  background: rgba(255,255,255,0.7);
  display: flex; align-items: center; justify-content: center;
  font-size: 16px;
}

/* --- Prompt Card --- */
.prompt-card {
  border-radius: 16px;
  padding: 20px 16px;
  font-size: 17px;
  line-height: 1.8;
  margin-bottom: 16px;
  position: relative;
}
.prompt-card.blue { background: #E6F0FF; }
.prompt-card.yellow { background: #FFF9C4; }

/* --- Instruction Bar --- */
.instruction-bar {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-secondary);
  margin: 16px 0;
  font-family: var(--font-heading);
}

/* --- Audio Button --- */
.audio-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(0,0,0,0.06);
  border: none;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: background 0.2s, transform 0.15s;
  flex-shrink: 0;
}
.audio-btn:hover { background: rgba(0,0,0,0.12); }
.audio-btn:active { transform: scale(0.92); }
.audio-btn svg { width: 18px; height: 18px; fill: var(--text-secondary); }

/* --- New Tag --- */
.new-tag {
  display: inline-block;
  background: #FF9800;
  color: white;
  font-size: 11px;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
  vertical-align: middle;
}

/* --- Image Card (for E004) --- */
.image-card {
  width: 100%;
  border-radius: 16px;
  background: #E6F0FF;
  padding: 24px 16px 16px;
  display: flex;
  align-items: center;
  gap: 16px;
  margin-bottom: 8px;
  position: relative;
}
.image-card .new-tag {
  position: absolute;
  top: 0; left: 0;
  border-radius: 16px 0 8px 0;
}
.image-card .img-area {
  width: 80px; height: 80px;
  border-radius: 12px;
  background: rgba(255,255,255,0.6);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 48px;
  flex-shrink: 0;
}
.image-card .text-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.image-card .zh-text {
  font-size: 24px;
  font-weight: 800;
  color: var(--text-primary);
  font-family: var(--font-heading);
}
.image-card .card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 4px;
}

/* --- Speech Bubble Card (white style, for E010) --- */
.speech-bubble-card {
  width: 100%;
  border-radius: 16px;
  background: #FFFFFF;
  box-shadow: 0 2px 12px rgba(0,0,0,0.08);
  padding: 28px 16px 16px;
  margin-bottom: 8px;
  position: relative;
}
.speech-bubble-card .new-tag {
  position: absolute;
  top: 0; left: 0;
  border-radius: 16px 0 8px 0;
}
.speech-bubble-card .bubble-text {
  font-size: 19px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.7;
  font-family: var(--font-heading);
}
.speech-bubble-card .bubble-phonetic {
  font-size: 13px;
  color: var(--text-tertiary);
  margin-top: 6px;
  font-style: italic;
}
.speech-bubble-card .card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 10px;
}

/* --- Sentence Card (for E008) --- */
.sentence-card {
  width: 100%;
  border-radius: 16px;
  background: #E6F0FF;
  padding: 24px 16px 16px;
  margin-bottom: 8px;
  position: relative;
}
.sentence-card .new-tag {
  position: absolute;
  top: 0; left: 0;
  border-radius: 16px 0 8px 0;
}
.sentence-card .en-text {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.6;
}
.sentence-card .card-actions {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
}

/* --- Word Tooltip --- */
.word-tip {
  position: relative;
  cursor: pointer;
  border-bottom: 1px dashed transparent;
  transition: border-color 0.2s;
}
.word-tip:hover { border-bottom-color: var(--color-exposure); }
.word-tip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: var(--text-primary);
  color: white;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 10;
}
.word-tip:hover::after {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* --- Chunk Underlines --- */
.chunk-row {
  display: flex;
  flex-wrap: wrap;
  align-items: flex-end;
  gap: 12px;
  margin: 16px 0;
  padding: 0 4px;
}
.chunk-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0;
}
.chunk-zh {
  font-size: 14px;
  color: var(--text-secondary);
  font-weight: 500;
  margin-bottom: 4px;
}
.chunk-underline {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 70px;
  padding: 6px 12px;
  border-bottom: 3px solid #D0D5DD;
  border-style: none none dashed none;
  border-width: 0 0 3px 0;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  transition: all 0.3s;
  min-height: 32px;
}
.chunk-underline.active {
  border-style: solid;
  border-color: #4F8CF7;
  background: rgba(79, 140, 247, 0.06);
}
.chunk-underline.filled {
  border-style: solid;
  border-color: #4CAF50;
  background: #E8F5E9;
  color: #2E7D32;
  animation: bounceIn 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.chunk-underline.wrong-flash {
  border-color: #FF5252;
  background: #FFEBEE;
  animation: shake 0.4s ease;
}
.chunk-punct {
  font-size: 17px;
  font-weight: 600;
  color: var(--text-primary);
  align-self: flex-end;
  padding-bottom: 6px;
}

/* --- Prompt card word-tip override --- */
.prompt-card .word-tip {
  position: relative;
  cursor: pointer;
  border-bottom: 1px dashed rgba(0,0,0,0.25);
  transition: border-color 0.2s;
}
.prompt-card .word-tip:hover {
  border-bottom-color: var(--color-exposure);
}
.prompt-card .word-tip::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 6px);
  left: 50%;
  transform: translateX(-50%) scale(0.9);
  background: var(--text-primary);
  color: white;
  font-size: 12px;
  font-weight: 500;
  padding: 4px 10px;
  border-radius: 8px;
  white-space: nowrap;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s, transform 0.2s;
  z-index: 10;
}
.prompt-card .word-tip:hover::after {
  opacity: 1;
  transform: translateX(-50%) scale(1);
}

/* --- Vertical Options (E004, E005, E008) --- */
.vertical-options {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin: 12px 0;
}
.vertical-option {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 14px 20px;
  border-radius: 12px;
  background: #fff;
  border: 2px solid #E0E0E0;
  font-size: 16px;
  font-weight: 500;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  text-align: left;
  min-height: 48px;
}
.vertical-option:hover { border-color: #BDBDBD; background: #FAFAFA; }
.vertical-option:active { transform: scale(0.98); }
.vertical-option.selected { border-color: #4F8CF7; background: #F0F4FF; }
.vertical-option.correct {
  border-color: #4CAF50;
  background: #E8F5E9;
  color: #2E7D32;
  animation: bounceIn 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
  pointer-events: none;
}
.vertical-option.wrong {
  border-color: #FF5252;
  background: #FFEBEE;
  color: #C62828;
  animation: shake 0.4s ease;
}
.vertical-option.disabled {
  background: #F5F5F5;
  border-color: #E0E0E0;
  color: #BDBDBD;
  pointer-events: none;
}

/* --- Option Pool / Pills (E006, E007) --- */
.option-pool {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  justify-content: center;
  margin: 20px 0 8px;
  padding: 16px;
  background: #F8F9FA;
  border-radius: 16px;
  min-height: 64px;
}
.option-pill {
  display: inline-flex;
  align-items: center;
  padding: 10px 22px;
  border-radius: 24px;
  background: #fff;
  border: 2px solid #E0E0E0;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.25s;
  user-select: none;
  min-height: 44px;
}
.option-pill:hover { border-color: #BDBDBD; background: #FAFAFA; transform: translateY(-1px); }
.option-pill:active { transform: scale(0.95); }
.option-pill.correct {
  border-color: #4CAF50;
  background: #E8F5E9;
  color: #2E7D32;
  pointer-events: none;
}
.option-pill.wrong {
  border-color: #FF5252;
  background: #FFEBEE;
  color: #C62828;
  animation: shake 0.4s ease;
}
.option-pill.used {
  background: #E0E0E0;
  border-color: #BDBDBD;
  color: #9E9E9E;
  pointer-events: none;
}

/* --- Fly-in Animation --- */
@keyframes flyIn {
  0% { opacity: 0; transform: translateY(20px) scale(0.9); }
  60% { opacity: 1; transform: translateY(-4px) scale(1.04); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}
.fly-in { animation: flyIn 0.45s ease forwards; }

/* --- Pink Flash --- */
@keyframes pinkFlash {
  0% { background: #FFEBEE; }
  50% { background: #FFCDD2; }
  100% { background: #FFEBEE; }
}
.pink-flash { animation: pinkFlash 0.4s ease; }

/* --- Exercise Section Container --- */
.ex-section {
  padding: 0 4px;
}
.ex-section + .ex-section { margin-top: 0; }

/* --- Completion Overlay --- */
.ex-completion {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 40px 20px;
  text-align: center;
  animation: fadeInUp 0.4s ease;
}
.ex-completion .completion-icon {
  font-size: 56px;
  margin-bottom: 16px;
}
.ex-completion .completion-text {
  font-size: 20px;
  font-weight: 700;
  color: var(--color-correct);
  font-family: var(--font-heading);
}
.ex-completion .completion-sub {
  font-size: 14px;
  color: var(--text-secondary);
  margin-top: 8px;
}
.ex-redo-btn {
  margin-top: 20px;
  padding: 12px 32px;
  border-radius: 24px;
  border: 2px solid #E0E0E0;
  background: #fff;
  font-size: 15px;
  font-weight: 600;
  color: var(--text-primary);
  cursor: pointer;
  transition: all 0.2s;
  font-family: var(--font-body);
}
.ex-redo-btn:hover { background: #F5F5F5; border-color: #BDBDBD; }
.ex-redo-btn:active { transform: scale(0.96); }

/* --- Audio Fill White Board (E009) --- */
.audio-fill-screen {
  min-height: 100%;
  width: calc(100% + 40px);
  margin: -20px;
  background: #FFFFFF;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  color: #2F3146;
}
.audio-fill-scene {
  position: relative;
  height: clamp(250px, 36vh, 318px);
  padding: 18px 18px 0;
  overflow: hidden;
  background:
    linear-gradient(180deg, rgba(39, 29, 74, 0.9) 0%, rgba(54, 65, 94, 0.72) 56%, rgba(67, 82, 107, 0.55) 100%),
    linear-gradient(135deg, #2B174F 0%, #496E91 54%, #E0B777 100%);
}
.af-room {
  position: absolute;
  inset: 0;
  opacity: 0.72;
  filter: blur(2px);
}
.af-room span {
  position: absolute;
  display: block;
}
.af-window {
  top: 44px;
  left: 90px;
  width: 190px;
  height: 82px;
  border-radius: 8px;
  background: linear-gradient(180deg, #A9CFE5, #6FA0C4);
  box-shadow: inset 0 0 0 8px rgba(255,255,255,0.16);
}
.af-board {
  top: 78px;
  left: 16px;
  width: 86px;
  height: 110px;
  border-radius: 12px;
  background: linear-gradient(180deg, #7E8E58, #B87A53);
}
.af-table {
  top: 174px;
  left: 16px;
  width: 180px;
  height: 22px;
  border-radius: 12px;
  background: #C58A58;
  box-shadow: 148px 12px 0 rgba(197,138,88,0.82);
}
.af-lamp {
  top: 126px;
  right: 48px;
  width: 54px;
  height: 118px;
  border-radius: 26px 26px 10px 10px;
  background: rgba(36, 40, 58, 0.72);
}
.af-hud {
  position: relative;
  z-index: 3;
  display: flex;
  align-items: center;
  gap: 14px;
}
.af-settings {
  width: 42px;
  height: 42px;
  border: 0;
  border-radius: 50%;
  background: #FFFFFF;
  color: #6B6E7C;
  font-size: 22px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 4px 12px rgba(18, 22, 38, 0.18);
}
.af-progress {
  flex: 1;
  height: 28px;
  border: 5px solid #FFFFFF;
  border-radius: 999px;
  background: rgba(255,255,255,0.72);
  overflow: hidden;
  box-shadow: 0 4px 12px rgba(18, 22, 38, 0.16);
}
.af-progress-fill {
  width: 34%;
  height: 100%;
  border-radius: 999px;
  background: #11D59A;
}
.af-life {
  height: 42px;
  min-width: 84px;
  padding: 0 14px 0 8px;
  border-radius: 999px;
  background: #FFFFFF;
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: var(--font-heading);
  font-size: 18px;
  font-weight: 800;
  color: #33364C;
  box-shadow: 0 4px 12px rgba(18, 22, 38, 0.18);
}
.af-heart {
  width: 38px;
  height: 38px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  background: linear-gradient(135deg, #FF8DA1, #FF5269);
  color: #FFFFFF;
  font-size: 22px;
  text-shadow: 0 2px 3px rgba(160, 31, 55, 0.22);
}
.af-speech {
  position: relative;
  z-index: 3;
  width: min(278px, calc(100% - 92px));
  margin-top: 34px;
  padding: 24px 18px 20px;
  border-radius: 18px;
  background: #FFFFFF;
  box-shadow: 0 10px 26px rgba(20, 23, 42, 0.18);
}
.af-speech::after {
  content: "";
  position: absolute;
  left: 54px;
  bottom: -18px;
  width: 32px;
  height: 32px;
  background: #FFFFFF;
  transform: rotate(45deg);
  border-radius: 0 0 6px 0;
}
.af-new-flag {
  position: absolute;
  top: 0;
  left: 0;
  padding: 7px 17px 7px 18px;
  border-radius: 18px 0 16px 0;
  background: #4F82F3;
  color: #FFFFFF;
  font-family: var(--font-heading);
  font-size: 13px;
  font-weight: 800;
  text-transform: uppercase;
}
.af-sentence-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.af-sentence {
  flex: 1;
  font-family: var(--font-heading);
  font-size: 21px;
  font-weight: 700;
  line-height: 1.35;

}
.af-blank {
  display: inline-flex;
  min-width: 76px;
  height: 28px;
  border-bottom: 4px dotted #C3C6CF;
  color: #4F82F3;
  justify-content: center;
  align-items: flex-end;
  padding: 0 6px 1px;
  transition: all 0.25s ease;
}
.af-blank.filled {
  min-width: 84px;
  border-bottom-style: solid;
  border-bottom-color: #11B981;
  color: #168A66;
}
.af-speaker-round {
  width: 42px;
  height: 42px;
  border: 0;
  border-radius: 50%;
  background: #4F82F3;
  color: #FFFFFF;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: transform 0.15s ease, background 0.2s ease;
}
.af-speaker-round:hover { background: #3E72E0; }
.af-speaker-round:active { transform: scale(0.93); }
.af-speaker-round svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}
.af-character {
  position: absolute;
  z-index: 2;
  line-height: 1;
  filter: drop-shadow(0 10px 12px rgba(18, 22, 38, 0.26));
  user-select: none;
}
.af-character.left {
  left: 36px;
  bottom: 2px;
  font-size: 82px;
}
.af-character.right {
  right: 30px;
  bottom: 16px;
  font-size: 70px;
}
.audio-fill-board {
  position: relative;
  z-index: 4;
  flex: 1;
  margin-top: -8px;
  padding: 24px 20px calc(18px + env(safe-area-inset-bottom));
  border-radius: 28px 28px 0 0;
  background: #FFFFFF;
  box-shadow: 0 -10px 30px rgba(26, 29, 38, 0.12);
  display: flex;
  flex-direction: column;
}
.audio-fill-question {
  font-family: var(--font-heading);
  font-size: 21px;
  font-weight: 700;
  line-height: 1.45;
  color: #44475D;
  margin-bottom: 18px;
}
.audio-choice-list {
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.audio-choice {
  width: 100%;
  min-height: 66px;
  border: 2px solid #E4E7EC;
  border-radius: 17px;
  background: #FFFFFF;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 18px;
  cursor: pointer;
  transition: border-color 0.2s ease, background 0.2s ease, transform 0.15s ease, box-shadow 0.2s ease;
}
.audio-choice:hover {
  border-color: #C8D0DC;
  background: #FAFBFD;
}
.audio-choice:active { transform: scale(0.985); }
.audio-choice.selected {
  border-color: #4F82F3;
  background: #F1F6FF;
  box-shadow: 0 0 0 4px rgba(79, 130, 243, 0.12);
}
.audio-choice.correct {
  border-color: #10B981;
  background: #E9F8F2;
  animation: bounceIn 0.5s cubic-bezier(0.68,-0.55,0.265,1.55);
}
.audio-choice.wrong {
  border-color: #FF5252;
  background: #FFF0F0;
  animation: shake 0.4s ease;
}
.af-choice-speaker {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  background: #EDF4FF;
  color: #369CEB;
  flex-shrink: 0;
}
.af-choice-speaker svg {
  width: 22px;
  height: 22px;
  fill: currentColor;
}
.af-wave {
  height: 36px;
  display: flex;
  align-items: center;
  gap: 4px;
}
.af-wave span {
  width: 5px;
  height: var(--h);
  border-radius: 999px;
  background: #36AEEA;
  opacity: 0.95;
}
.audio-choice.is-playing .af-wave span {
  animation: afWavePulse 0.62s ease-in-out infinite;
}
.af-wave span:nth-child(2n) { animation-delay: 0.08s; }
.af-wave span:nth-child(3n) { animation-delay: 0.16s; }
.af-wave span:nth-child(4n) { animation-delay: 0.24s; }
.audio-fill-feedback {
  min-height: 38px;
  margin: 12px 0;
  padding: 11px 14px;
  border-radius: 14px;
  font-size: 14px;
  font-weight: 600;
  display: flex;
  align-items: center;
  opacity: 0;
  transform: translateY(6px);
  transition: opacity 0.2s ease, transform 0.2s ease;
}
.audio-fill-feedback.show {
  opacity: 1;
  transform: translateY(0);
}
.audio-fill-feedback.correct {
  background: #E9F8F2;
  color: #14795B;
}
.audio-fill-feedback.wrong {
  background: #FFF0F0;
  color: #C62828;
}
.audio-fill-actions {
  margin-top: auto;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.audio-fill-skip {
  border: 0;
  background: transparent;
  color: #9AA0A6;
  font-family: var(--font-heading);
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  min-height: 40px;
}
.audio-fill-check {
  min-height: 52px;
  border: 0;
  border-radius: 17px;
  background: #4F82F3;
  color: #FFFFFF;
  font-family: var(--font-heading);
  font-size: 17px;
  font-weight: 800;
  cursor: pointer;
  transition: transform 0.15s ease, background 0.2s ease, opacity 0.2s ease;
}
.audio-fill-check:disabled {
  background: #E1E5EA;
  color: #A9B0BA;
  cursor: not-allowed;
}
.audio-fill-check:not(:disabled):active { transform: scale(0.985); }
.audio-fill-check.done { background: #10B981; }
@keyframes afWavePulse {
  0%, 100% { transform: scaleY(0.72); }
  50% { transform: scaleY(1.18); }
}
@media (max-width: 420px) {
  .audio-fill-scene { height: clamp(252px, 36vh, 310px); }
  .af-speech { width: min(272px, calc(100% - 76px)); margin-top: 32px; }
  .af-sentence { font-size: 20px; }
  .af-character.left { left: 28px; font-size: 78px; }
  .af-character.right { right: 20px; font-size: 68px; }
  .audio-fill-question { font-size: 20px; }
}

/* --- Spec-based iPhone viewport question rebuild --- */
.modal-container.duo-reference-modal {
  width: clamp(390px, 100vw, 440px);
  max-width: 100vw;
  height: clamp(844px, 100dvh, 956px);
  max-height: 100dvh;
  border-radius: 0;
  background: #F7FBFF;
}
.modal-container.duo-reference-modal .modal-content {
  width: 100%;
  max-width: 100vw;
  height: 100%;
  max-height: 100dvh;
  padding: 0;
  overflow: hidden;
}
.spec-screen,
.spec-screen * {
  box-sizing: border-box;
}
.spec-screen {
  position: relative;
  width: 100%;
  height: 100%;
  min-height: 100%;
  overflow: hidden;
  background: url("assets/images/churros-night.webp") center top / cover no-repeat;
  color: #283044;
  font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
}
.spec-board {
  position: absolute;
  z-index: 3;
  left: 0;
  right: 0;
  bottom: 0;
  width: 100%;
  aspect-ratio: 393 / 523;
  max-height: calc(100% - 120px);
  min-height: 523px;
  border-radius: 16px 16px 0 0;
  border-top-left-radius: 16px;
  border-top-right-radius: 16px;
  border-bottom-right-radius: 0;
  border-bottom-left-radius: 0;
  background: #FFFFFF;
  overflow: hidden;
}
.spec-screen.spec-context-intro .spec-scene {
  animation: specSceneFadeIn 0.42s ease both;
}
.spec-screen.spec-context-intro .spec-board {
  opacity: 0;
  transform: translateY(28px);
  pointer-events: none;
}
.spec-screen.spec-context-board-ready .spec-board {
  animation: specBoardRiseIn 0.3s cubic-bezier(0.2, 0.8, 0.2, 1) both;
}
.spec-board-resize-handle {
  position: absolute;
  z-index: 5;
  top: 8px;
  left: 50%;
  width: 78px;
  height: 24px;
  border: 0;
  border-radius: 999px;
  background: transparent;
  transform: translateX(-50%);
  cursor: grab;
  touch-action: none;
}
.spec-board-resize-handle::before {
  content: "";
  position: absolute;
  left: 50%;
  top: 9px;
  width: 46px;
  height: 5px;
  border-radius: 999px;
  background: #D8DDE8;
  transform: translateX(-50%);
}
.spec-board-resize-handle:active {
  cursor: grabbing;
}
.spec-resizable-screen .spec-board {
  top: var(--board-top, 321px);
  bottom: 0;
  aspect-ratio: auto;
  min-height: 0;
  max-height: none;
  transition: top 0.24s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.spec-resizable-screen.board-auto-expanding .spec-board {
  transition: top 0.7s cubic-bezier(0.2, 0.8, 0.2, 1);
}
.spec-resizable-screen.board-dragging .spec-board {
  transition: none;
}
.spec-fallback-screen .spec-content,
.spec-reading-screen .spec-content {
  top: 58px;
}
.demo-reading-image-frame {
  width: 301px;
  aspect-ratio: 4 / 3;
  height: auto;
  border-radius: 12px;
  background: rgba(255,255,255,0.86);
  border: 6px solid #FFFFFF;
  box-shadow: 0 14px 34px rgba(40,48,68,0.18);
  overflow: hidden;
}
.demo-reading-image-frame img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.spec-reading-card {
  width: 361px;
  padding: 14px;
  border-radius: 14px;
  background: #F4F7FF;
  border: 1.5px solid #C7D7FF;
  color: #444764;
}
.spec-reading-text {
  color: #444764;
  font-size: 17px;
  line-height: 2.55;
  text-align: left;
}
.spec-reading-blank {
  min-width: 88px;
  width: auto;
  height: 31px;
  min-height: 0;
  margin: 0 4px;
  padding: 0;
  border: 0;
  border-bottom: 1px solid #E2E2E9;
  border-radius: 0;
  background: transparent;
  color: transparent;
  font: inherit;
  font-weight: 400;
  line-height: 31px;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: -17px;
  cursor: pointer;
}
.spec-reading-blank.empty {
  color: transparent;
}
.spec-reading-blank.active {
  border-bottom-color: #2525DE;
}
.spec-reading-blank.filled {
  position: relative;
  min-width: 56px;
  height: 34px;
  padding: 0 10px;
  border: 1px solid transparent;
  border-radius: 10px;
  background: #B8ECD2;
  color: #283044;
  font-size: inherit;
  font-weight: 400;
  line-height: 1;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  vertical-align: middle;
  white-space: nowrap;
  text-decoration-line: underline;
  text-decoration-style: dashed;
  text-decoration-color: #00000059;
  text-decoration-thickness: 1px;
  text-underline-offset: 5px;
  animation: specReadingTokenIn 0.24s ease both;
}
.spec-reading-blank.filled.selected {
  border-color: #E6E9EE;
  border-bottom: 1px solid #2525DE;
  background: #FFFFFF;
  box-shadow: 0 1px 3px rgba(40,48,68,0.12);
  text-decoration-line: none;
}
.spec-reading-blank.filled.correct {
  border-color: #26C676;
  background: #B8ECD2;
}
.spec-reading-blank.filled.wrong {
  border-color: #F23E3E;
  background: #FBC0C0;
  animation: specWrongShake 0.5s ease;
}
.spec-reading-blank.filled.spec-lookup-token {
  border-bottom: 1px solid transparent;
  padding-bottom: 0;
}
.spec-reading-text.final {
  animation: specReadingFinalText 0.26s ease both;
}
@keyframes specReadingTokenIn {
  from { opacity: 0; transform: translateY(3px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes specReadingFinalText {
  from { opacity: 0.35; }
  to { opacity: 1; }
}
@supports (height: 100svh) {
  .modal-container.duo-reference-modal {
    height: clamp(844px, 100svh, 956px);
    max-height: 100svh;
  }
  .modal-container.duo-reference-modal .modal-content {
    max-height: 100svh;
  }
}
.spec-close {
  position: absolute;
  z-index: 10;
  top: 16px;
  left: 14px;
  width: 32px;
  height: 32px;
  border: 0;
  border-radius: 50%;
  background: rgba(255,255,255,0.82);
  color: #5E648A;
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
}
.spec-progress {
  position: absolute;
  z-index: 2;
  top: 50px;
  left: 50%;
  width: 213px;
  height: 24px;
  padding: 3px;
  transform: translateX(-50%);
  border-radius: 100px;
  background: #FEFCFA;
}
.spec-progress-track {
  position: relative;
  width: 207px;
  height: 18px;
  overflow: hidden;
  border-radius: 100px;
  background: #E0E0E0;
  box-shadow: inset 0 2px 0 #0000000F;
}
.spec-progress-fill {
