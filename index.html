<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>词组关 / 句子关原型</title>
<style>
* { box-sizing: border-box; }
:root {
  --color-background-primary: #FFFFFF;
  --color-background-secondary: #F1EFE8;
  --color-background-tertiary: #FAF9F5;
  --color-background-info: #E6F1FB;
  --color-background-success: #EAF3DE;
  --color-background-warning: #FAEEDA;
  --color-text-primary: #2C2C2A;
  --color-text-secondary: #5F5E5A;
  --color-text-tertiary: #888780;
  --color-text-info: #0C447C;
  --color-text-success: #27500A;
  --color-text-warning: #633806;
  --color-border-secondary: rgba(44,44,42,0.3);
  --color-border-tertiary: rgba(44,44,42,0.15);
  --color-border-info: #185FA5;
  --border-radius-md: 8px;
  --border-radius-lg: 12px;
  --border-radius-xl: 16px;
  --font-sans: "Anthropic Sans", ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Noto Sans SC", "Microsoft YaHei", sans-serif;
  --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", monospace;
  --phone-bg: #2C2C2E;
  --design-width: 980;
  --design-height: 864;
  --app-scale: 1;
}
html,
body {
  margin: 0;
  width: 100%;
  height: 100%;
  background: var(--color-background-tertiary);
  color: var(--color-text-primary);
  font-family: var(--font-sans);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
body {
  min-height: 100vh;
  overflow: hidden;
}
button {
  font: inherit;
}
.app-viewport {
  width: 100vw;
  height: 100vh;
  display: grid;
  place-items: center;
  overflow: hidden;
  background: var(--color-background-tertiary);
}
.app-scale-box {
  position: relative;
  width: calc(var(--design-width) * var(--app-scale) * 1px);
  height: calc(var(--design-height) * var(--app-scale) * 1px);
}
.app {
  position: absolute;
  left: 0;
  top: 0;
  width: calc(var(--design-width) * 1px);
  height: calc(var(--design-height) * 1px);
  display: grid;
  grid-template-columns: 200px minmax(430px, 1fr) 320px;
  gap: 10px;
  padding: 0;
  transform: scale(var(--app-scale));
  transform-origin: left top;
}
.panel {
  min-height: 0;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-xl);
  background: var(--color-background-primary);
  overflow: hidden;
}
.sidebar,
.inspector {
  display: flex;
  flex-direction: column;
}
.section {
  padding: 12px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.section.fill {
  min-height: 0;
  flex: 1;
  overflow: auto;
}
.label {
  display: block;
  margin-bottom: 8px;
  color: var(--color-text-tertiary);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.tabs {
  display: flex;
  gap: 2px;
  border-bottom: 0.5px solid var(--color-border-tertiary);
}
.tab {
  min-height: 36px;
  border: 0;
  border-bottom: 2px solid transparent;
  border-radius: 0;
  background: none;
  color: var(--color-text-secondary);
  padding: 10px 14px;
  font-size: 13px;
  font-weight: 400;
  cursor: pointer;
}
.tab:hover {
  color: var(--color-text-primary);
}
.tab.active {
  color: var(--color-text-primary);
  border-bottom-color: var(--color-text-primary);
  font-weight: 500;
}
.entry-list,
.state-list,
.component-list {
  display: grid;
  gap: 8px;
}
.entry,
.state {
  width: 100%;
  min-height: 42px;
  border: 0.5px solid var(--color-border-secondary);
  border-radius: var(--border-radius-md);
  background: transparent;
  color: var(--color-text-primary);
  padding: 10px 12px;
  text-align: left;
  font-size: 14px;
  font-weight: 400;
  cursor: pointer;
}
.entry:hover,
.state:hover {
  background: var(--color-background-secondary);
}
.entry.active,
.state.active {
  border: 2px solid var(--color-border-info);
  background: var(--color-background-primary);
}
.entry.child {
  width: calc(100% - 18px);
  margin-left: 18px;
  color: var(--color-text-secondary);
}
.entry.parent-active {
  border-color: var(--color-border-tertiary);
  background: var(--color-background-secondary);
}
.stage {
  min-height: 0;
  display: grid;
  place-items: center;
  overflow: auto;
  padding: 0;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-lg);
  background: var(--color-background-secondary);
}
.phone {
  width: 410px;
  height: 864px;
  border-radius: 32px;
  padding: 10px;
  background: #111113;
  border: 0.5px solid #000000;
}
.phone-screen {
  position: relative;
  width: 390px;
  height: 844px;
  overflow: hidden;
  border-radius: 23px;
  background: var(--phone-bg);
}
.runtime-frame {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  display: block;
  border: 0;
  background: var(--phone-bg);
  opacity: 0;
  pointer-events: none;
}
.runtime-frame.visible {
  opacity: 1;
  pointer-events: auto;
}
#frozenRuntime.visible {
  pointer-events: none;
}
.capture-frame {
  position: fixed;
  left: -12000px;
  top: 0;
  width: 390px;
  height: 844px;
  border: 0;
  opacity: 0;
  pointer-events: none;
}
.inspector-title {
  margin: 0;
  color: var(--color-text-primary);
  font-size: 18px;
  line-height: 1.35;
  font-weight: 500;
}
.inspector-note {
  margin: 8px 0 0;
  color: var(--color-text-secondary);
  font-size: 13px;
  line-height: 1.6;
  font-weight: 400;
}
.inspector-note:empty {
  display: none;
}
.component-card {
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-secondary);
  padding: 12px;
}
.component-card.special {
  border-color: rgba(24, 95, 165, 0.28);
  background: var(--color-background-info);
}
.component-card.special .component-title {
  color: var(--color-text-info);
}
.component-title {
  margin: 0 0 8px;
  color: var(--color-text-primary);
  font-size: 14px;
  font-weight: 500;
}
.field-list {
  display: grid;
  gap: 7px;
}
.field {
  display: grid;
  gap: 2px;
}
.field-name {
  color: var(--color-text-tertiary);
  font-size: 11px;
  line-height: 1.35;
  font-weight: 500;
}
.field-body {
  color: var(--color-text-secondary);
  font-size: 13px;
  line-height: 1.55;
  font-weight: 400;
}
.component-summary {
  display: grid;
  gap: 10px;
}
.component-summary .component-card {
  background: var(--color-background-secondary);
}
.state-name {
  display: block;
  font-size: 14px;
  line-height: 1.3;
  font-weight: 500;
}
.state-desc {
  display: block;
  margin-top: 4px;
  color: var(--color-text-secondary);
  font-size: 12px;
  line-height: 1.4;
  font-weight: 400;
}
.state.active .state-desc {
  color: var(--color-text-secondary);
}
.runtime-warning {
  display: none;
  margin-top: 10px;
  border: 0.5px solid var(--color-border-tertiary);
  border-radius: var(--border-radius-md);
  background: var(--color-background-secondary);
  padding: 10px 12px;
  color: var(--color-text-secondary);
  font-size: 12px;
  line-height: 1.5;
}
.runtime-warning.visible {
  display: block;
}
</style>
</head>

</div>
